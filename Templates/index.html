<!DOCTYPE html>
<html>
<head>
    <title>Unit Converter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#007bff">

     <style>
        :root {
    --bg: #ffffff;
    --text: #000000;
    --card-bg: #f2f2f2;
    --button-bg: #007bff;
    --button-text: #ffffff;
}

.dark-mode {
    --bg: #1e1e1e;
    --text: #ffffff;
    --card-bg: #2a2a2a;
    --button-bg: #4a90e2;
    --button-text: #ffffff;
}
.dark-mode .container {
    box-shadow: 0 0 25px rgba(0, 150, 255, 0.4);
    transition: box-shadow 0.4s ease;
}
.dark-mode select {
    background-image: url("data:image/svg+xml;utf8,<svg fill='%23ddd' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><polygon points='0,0 20,0 10,10'/></svg>");
    border-color: #555;
}


        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background-color 0.4s ease, color 0.4s ease;

        }

        .container {
    background: var(--card-bg);
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    width: 95%;
    max-width: 500px;
    margin: 20px auto;
    padding: 25px;
    text-align: center;
    transition: background-color 0.4s ease, color 0.4s ease;
}


        h1 {
            margin-bottom: 25px;
            font-size: 28px;
    color: var(--text);
    transition: color 0.4s ease;
}


        input, select {
            width: 100%;
            padding: 14px;
            margin: 14px 0;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: var(--card-bg);
    color: var(--text);
    transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        }
    /* Custom dropdown styling */
select {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;

    background: var(--card-bg);
    color: var(--text);
    padding: 14px;
    padding-right: 40px; /* space for arrow */
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
    background-image: url("data:image/svg+xml;utf8,<svg fill='%23aaa' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><polygon points='0,0 20,0 10,10'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 14px;
}

select option {
    background-image: none !important;
    background-image: none !important;
    padding-right: 0 !important;
    appearance: none;
    -webkit-appearance: none;
}

select:hover {
    border-color: var(--button-bg);
}

select:focus {
    border-color: var(--button-bg);
    outline: none;
}

input:focus, select:focus {
    border-color: var(--button-bg);
    outline: none;
}
        button {
            width: 100%;
            padding: 14px;
            background: var(--button-bg);
            color: var(--button-text);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        button:hover {
            background: #005fcc;
        }
.theme-toggle {
    transition: transform 0.3s ease, background-color 0.3s ease, color 0.3s ease;
}
.theme-toggle:active {
    transform: scale(0.92);
}
.dark-mode .theme-toggle {
    transform: rotate(180deg);
}

        .result {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            color: var(--text);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease; transform 0.4 ease;
        }
        .result.show {
    opacity: 1;
    transform: translateY(0);
}
@media (max-width: 480px) {
    .container {
        width: 90%;
        padding: 25px;
    }

    h1 {
        font-size: 22px;
    }

    input, select, button {
        font-size: 16px;
        padding: 12px;
    }

    .result {
        font-size: 20px;
    }
}

    </style>
</head>
<body>
    <div class="container">
    <h1>Unit Converter</h1>
<button id="theme-toggle" class="theme-toggle">🌙 Dark Mode</button>

    <form method="POST">
        <input type="number" step="any" name="value" placeholder="Enter a number" required>
        <select name="category" id="category">
    <option value="length">Length</option>
    <option value="weight">Weight</option>
    <option value="temperature">Temperature</option>
</select>


        <select name="conversion" id="conversion">

    <!-- Length conversions -->
    <option value="mm_to_cm" data-category="length">Millimetres → Centimetres</option>
    <option value="cm_to_mm" data-category="length">Centimetres → Millimetres</option>
    <option value="cm_to_m" data-category="length">Centimetres → Metres</option>
    <option value="m_to_cm" data-category="length">Metres → Centimetres</option>
    <option value="inch_to_mm" data-category="length">Inches → Millimetres</option>
    <option value="mm_to_inch" data-category="length">Millimetres → Inches</option>

    <!-- Weight conversions -->
    <option value="g_to_kg" data-category="weight">Grams → Kilograms</option>
    <option value="kg_to_g" data-category="weight">Kilograms → Grams</option>

    <!-- Temperature conversions -->
    <option value="c_to_f" data-category="temperature">Celsius → Fahrenheit</option>
    <option value="f_to_c" data-category="temperature">Fahrenheit → Celsius</option>

</select>

<button type="button" id="swap">🔄 Swap Units</button>

        <button type="submit">Convert</button>
    </form>



    <div id="result" class="result {% if result is not none %}show{% endif %}">
    {% if result is not none %}
        Result: {{ result }}
    {% endif %}
</div>

    <script>
    const categorySelect = document.getElementById("category");
    const conversionSelect = document.getElementById("conversion");

    function filterConversions() {
        const selectedCategory = categorySelect.value;

        for (let option of conversionSelect.options) {
            const optionCategory = option.getAttribute("data-category");
            option.style.display = (optionCategory === selectedCategory) ? "block" : "none";
        }

        // Automatically select the first visible option
        for (let option of conversionSelect.options) {
            if (option.style.display === "block") {
                conversionSelect.value = option.value;
                break;
            }
        }
    }

    // Run when category changes
    categorySelect.addEventListener("change", filterConversions);

    // Run once when page loads
    filterConversions();
</script>
<script>
    const toggleButton = document.getElementById("theme-toggle");

    toggleButton.addEventListener("click", () => {
        document.body.classList.toggle("dark-mode");

        if (document.body.classList.contains("dark-mode")) {
            toggleButton.textContent = "☀️ Light Mode";
        } else {
            toggleButton.textContent = "🌙 Dark Mode";
        }
    });
</script>
<script>
    document.addEventListener("keydown", (event) => {

        // Toggle dark mode with "D"
        if (event.key.toLowerCase() === "d") {
            document.getElementById("theme-toggle").click();
        }

        // Press Enter to submit the form
        if (event.key === "Enter") {
            const active = document.activeElement;

            // Only trigger convert if typing in the number field
            if (active && active.tagName === "INPUT") {
                event.preventDefault(); // stop form reload
                document.querySelector("button[type='submit']").click();
            }
        }
    });
</script>
<script>
document.getElementById("swap").addEventListener("click", () => {
    const conversionSelect = document.getElementById("conversion");
    const selected = conversionSelect.value;

    const reverse = {
        "mm_to_cm": "cm_to_mm",
        "cm_to_mm": "mm_to_cm",
        "cm_to_m": "m_to_cm",
        "m_to_cm": "cm_to_m",
        "inch_to_mm": "mm_to_inch",
        "mm_to_inch": "inch_to_mm",
        "g_to_kg": "kg_to_g",
        "kg_to_g": "g_to_kg",
        "c_to_f": "f_to_c",
        "f_to_c": "c_to_f"
    };

    if (reverse[selected]) {
        conversionSelect.value = reverse[selected];
    }
});
</script>

<script>
    // If result exists, trigger animation on page load
    const resultBox = document.getElementById("result");
    if (resultBox && resultBox.textContent.trim() !== "") {
        resultBox.classList.remove("show");
        void resultBox.offsetWidth; // restart animation
        resultBox.classList.add("show");
    }
</script>
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/service-worker.js");
}
</script>


</body>
</html>
